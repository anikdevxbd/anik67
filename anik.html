<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
       <style>
          .box1{
                width: 500px;
                height: 300px;
                background-color: green;
                position: relative;
                margin: auto;
                margin-top: 100px;

          }
    .box2{
        height: 200px;
        width: 200px;
        background-color: red;
        position:absolute;
        top: 50%;
        left: 50%;
        border-radius: 0%;
        transform: translate(-50% , -50%);

    }
    .box3{

            height: 500px;
            width: 500px;
            background: linear-gradient(red, green,blue) ;
           margin: auto;


    }

       </style>



<body>
    <div class="box1">
        <div class="box2">     
        </div>
        </div>
     <div class="box3"></div>
</body>
</html>
